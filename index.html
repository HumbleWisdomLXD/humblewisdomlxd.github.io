<!DOCTYPE html>
<html>
<head>
    <title>My Blog</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>My Blog</h1>
    <div id="posts"></div>

    <!-- Load posts -->
    <script src="js/posts.js"></script>
    <script>
        const container = document.getElementById("posts");
        blogPosts.forEach(post => {
            container.innerHTML += `
                <div class="post">
                    <h2>${post.title}</h2>
                    <p><em>By ${post.author} • ${post.date}</em></p>
                    ${post.content}
                </div>
            `;
        });
    </script>
</body>
