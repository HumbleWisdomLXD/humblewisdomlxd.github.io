<!DOCTYPE html>
<html>
<head>
    <title>Wisdom Blog</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Wisdom Blog</h1>
    <div id="posts"></div>
    
    <script src="js/posts.js"></script>
    <script>
        document.getElementById("posts").innerHTML = blogPosts.map(post => `
            <div class="post">
                <h2>${post.title}</h2>
                <p><i>By ${post.author} • ${post.date}</i></p>
                ${post.content}
            </div>
        `).join("");
    </script>
</body>
</html>
